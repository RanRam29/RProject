services:
  - type: web
    plan: free
    name: pm-server
    runtime: node
    buildCommand: pnpm install && pnpm --filter @pm/shared build && cd packages/server && npx prisma generate && npx prisma migrate deploy && npx tsx prisma/seed.ts && cd ../.. && pnpm --filter @pm/server build
    startCommand: cd packages/server && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: "https://rproject-mocha.vercel.app,http://localhost,https://localhost,capacitor://localhost"
    healthCheckPath: /api/health
